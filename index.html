<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="BusLink Admin Dashboard — Login to manage buses, drivers, routes, and mappings for the Raipur bus service.">
  <title>BusLink Admin</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="resources\Logo.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Left: Bus Illustration -->
      <div class="login-illustration">
        <img src="resources\Logo.png" alt="Logo">
      </div>

      <!-- Right: Form Section -->
      <div class="login-form-section">

        <!-- ══════ VIEW 1: Login ══════ -->
        <div id="view-login" class="auth-view active">
          <h1 id="login-heading">Login</h1>
          <p class="login-subtitle">Don't have an account? <a href="/signup.html">Sign Up</a></p>

          <div class="login-error" id="login-error"></div>

          <form id="login-form" autocomplete="on">
            <div class="input-group">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input type="email" id="login-email" name="email" placeholder="Email" required autocomplete="email">
            </div>

            <div class="input-group">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input type="password" id="login-password" name="password" placeholder="Password" required
                autocomplete="current-password">
              <button type="button" class="toggle-password" id="toggle-password"
                aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>

            <a href="#" class="forgot-link" id="show-forgot">Forgot password ?</a>

            <button type="submit" class="btn-login" id="btn-login">Login</button>
          </form>

          <div class="divider">Or</div>

          <div id="google-signin-container">
            <button type="button" class="btn-google" id="btn-google-login">
              <svg viewBox="0 0 24 24">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                  fill="#4285F4" />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853" />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05" />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335" />
              </svg>
              Sign in with Google
            </button>
          </div>
        </div>

        <!-- ══════ VIEW 2: Forgot Password ══════ -->
        <div id="view-forgot" class="auth-view">
          <a href="#" class="back-link" id="back-to-login-1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="19" y1="12" x2="5" y2="12" />
              <polyline points="12,19 5,12 12,5" />
            </svg>
            Back to Login
          </a>
          <h1>Forgot Password</h1>
          <p class="login-subtitle">Enter your email address and we'll send you a reset token.</p>

          <div class="login-error" id="forgot-error"></div>
          <div class="login-success" id="forgot-success"></div>

          <form id="forgot-form">
            <div class="input-group">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input type="email" id="forgot-email" name="email" placeholder="Email" required autocomplete="email">
            </div>

            <button type="submit" class="btn-login" id="btn-forgot">Send Reset Token</button>
          </form>
        </div>

        <!-- ══════ VIEW 3: Reset Password ══════ -->
        <div id="view-reset" class="auth-view">
          <a href="#" class="back-link" id="back-to-login-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="19" y1="12" x2="5" y2="12" />
              <polyline points="12,19 5,12 12,5" />
            </svg>
            Back to Login
          </a>
          <h1>Reset Password</h1>
          <p class="login-subtitle">Enter the reset token and your new password.</p>

          <div class="login-error" id="reset-error"></div>
          <div class="login-success" id="reset-success"></div>

          <form id="reset-form">
            <div class="input-group">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input type="email" id="reset-email" name="email" placeholder="Email" required autocomplete="email"
                readonly>
            </div>

            <div class="input-group">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input type="text" id="reset-token" name="token" placeholder="Reset Token" required autocomplete="off">
            </div>

            <div class="input-group">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input type="password" id="reset-new-password" name="newPassword" placeholder="New Password" required
                autocomplete="new-password" minlength="8">
              <button type="button" class="toggle-password" id="toggle-reset-password"
                aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>

            <div class="input-group">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
              <input type="password" id="reset-confirm-password" name="confirmPassword"
                placeholder="Confirm New Password" required autocomplete="new-password" minlength="8">
            </div>

            <button type="submit" class="btn-login" id="btn-reset">Reset Password</button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>

</html>
